apiVersion: v1
kind: Service
metadata:
  name: {{ include "bookstore.fullname" . }}-frontend
  labels:
    app: {{ include "bookstore.fullname" . }}-frontend
    {{- include "bookstore.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    app: {{ include "bookstore.fullname" . }}-frontend
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: 80
      protocol: TCP
      name: http
