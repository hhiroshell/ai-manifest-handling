apiVersion: v1
kind: Service
metadata:
  name: {{ include "bookstore.fullname" . }}-api
  labels:
    app: {{ include "bookstore.fullname" . }}-api
    {{- include "bookstore.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app: {{ include "bookstore.fullname" . }}-api
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: 8080
      protocol: TCP
      name: http
