apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: bookstore-ingress
spec:
  rules:
    - host: bookstore.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bookstore-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: bookstore-api
                port:
                  number: 8080
